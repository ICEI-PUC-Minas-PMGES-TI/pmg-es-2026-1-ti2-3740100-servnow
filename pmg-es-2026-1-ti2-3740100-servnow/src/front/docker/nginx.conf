server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota cai no index.html (React Router cuida do resto)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache dos assets com hash no nome
    location /assets/ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }
}
