spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/servnow
spring.datasource.username=postgres
spring.datasource.password=1705
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

server.port=8080

spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=5MB

# Diretorio para arquivos enviados (solicitacoes, fotos de perfil, documentos). O banco guarda apenas o caminho relativo.
app.storage.upload-dir=data/servnow-uploads

app.jwt.secret=${JWT_SECRET:servnow-jwt-secret-2026-servnow-jwt-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
