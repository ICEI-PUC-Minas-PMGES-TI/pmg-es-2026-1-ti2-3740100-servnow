

services:
  backend:
    build:
      context: ./src/backend
    ports:
      - "8080:8080"
    environment: 
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:5174"
    restart: unless-stopped

  frontend:
    build:
      context: ./src/front
      args:
        # URL do backend que o navegador vai chamar.
        VITE_API_URL: "http://localhost:8080"
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
