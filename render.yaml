# Render Blueprint - hospeda o BACKEND (Docker) do ServNow.
# O frontend e hospedado no Vercel e o banco e o Supabase, entao so o back fica aqui.
# Como usar: Render -> New + -> Blueprint -> conecta este repositorio.
#
# O CORS ja libera *.vercel.app e *.onrender.com por padrao (ver CorsConfig.java),
# entao normalmente nao precisa setar APP_CORS_ALLOWED_ORIGINS. Use a variavel apenas
# para liberar um dominio extra (separe por virgula).

services:
  - type: web
    name: servnow-backend
    runtime: docker
    rootDir: pmg-es-2026-1-ti2-3740100-servnow/src/backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
