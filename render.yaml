# Render Blueprint — backend (Docker) do ServNow.
# Front: Vercel (src/front) | Banco: Supabase
# Docs: pmg-es-2026-1-ti2-3740100-servnow/docs/README.md
# Como usar: Render -> New + -> Blueprint -> conecta este repositorio.
#
# O CORS ja libera *.vercel.app e *.onrender.com por padrao (ver CorsConfig.java),
# entao normalmente nao precisa setar APP_CORS_ALLOWED_ORIGINS. Use a variavel apenas
# para liberar um dominio extra (separe por virgula).

services:
  - type: web
    name: servnow-backend
    runtime: docker
    rootDir: pmg-es-2026-1-ti2-3740100-servnow/src/backend
    dockerfilePath: ./Dockerfile
    # Mesma regiao do banco Supabase (us-east-2 / Ohio) para reduzir a latencia das queries.
    plan: free
    region: ohio
    envVars:
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
